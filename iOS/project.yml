name: Officehours
options:
  bundleIdPrefix: com.shimondeitel.officehours
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Officehours:
    type: application
    platform: iOS
    sources:
      - path: Officehours
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.officehours
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Officehours/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  OfficehoursTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OfficehoursTests
      - path: Officehours.storekit
    dependencies:
      - target: Officehours
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.officehours.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  OfficehoursUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OfficehoursUITests
    dependencies:
      - target: Officehours
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.officehours.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Officehours:
    build:
      targets:
        Officehours: all
        OfficehoursTests: [test]
        OfficehoursUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Officehours.storekit
    test:
      config: Debug
      storeKitConfiguration: Officehours.storekit
      targets:
        - OfficehoursTests
        - OfficehoursUITests
    archive:
      config: Release
